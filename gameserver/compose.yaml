services:
  cs2:
    image: joedwards32/cs2:latest
    container_name: cs2-server
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27020:27020/udp"   # SourceTV
    # SRCDS_TOKEN + STEAM_API_KEY live in ./gameserver/.env (gitignored, never committed)
    env_file:
      - .env
    environment:
      # ── Identity ────────────────────────────────────────────────────────
      CS2_SERVERNAME: "Chef's CS2 Test Server"
      CS2_PORT: "27015"

      # ── Auth ────────────────────────────────────────────────────────────
      # GSLT comes from .env via env_file (SRCDS_TOKEN). LAN can stay on while
      # we test — Workshop downloads go through Steam content servers and work
      # in LAN mode as long as the GSLT/Web API key are present.
      CS2_LAN: "1"

      # ── Passwords ───────────────────────────────────────────────────────
      CS2_RCONPW: "CHANGE_ME_RCON"
      CS2_PW: ""

      # ── Gameplay ────────────────────────────────────────────────────────
      CS2_MAXPLAYERS: "12"
      CS2_GAMEALIAS: "casual"        # casual | competitive | wingman | deathmatch
      # Start on workshop map 3664560888 (zombie map). Setting CS2_HOST_WORKSHOP_MAP
      # makes the image launch with +host_workshop_map <id>, which auto-fetches and loads
      # the workshop content before the server is reachable. CS2_STARTMAP is kept as a
      # fallback for runs where workshop fetch fails.
      CS2_STARTMAP: "de_dust2"
      CS2_HOST_WORKSHOP_MAP: "3664560888"
      CS2_MAPGROUP: "mg_active"
      CS2_BOT_QUOTA: "2"
      CS2_CHEATS: "1"

      # ── Stability ───────────────────────────────────────────────────────
      CS2_SERVER_HIBERNATE: "0"      # MUST be 0 — hibernation crashes CS2

      # ── SourceTV ────────────────────────────────────────────────────────
      TV_ENABLE: "0"
      TV_PORT: "27020"

      # ── Validation on each container start ──────────────────────────────
      STEAMAPPVALIDATE: "0"          # 1 = re-validate every restart (slower but safer)

      # ── Debug ───────────────────────────────────────────────────────────
      # 0 off, 1 steamcmd, 2 cs2, 3 all
      DEBUG: "0"

    volumes:
      # All ~60GB of CS2 + plugins + configs live here, persisted across restarts
      - ./data:/home/steam/cs2-dedicated
  cs22:
    image: joedwards32/cs2:latest
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    dns:
      - 172.22.0.2        # lancache-dns internal IP on lanchache_default
    networks:
      - lanchache_default
    container_name: cs2-server2
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "27016:27015/tcp"
      - "27016:27015/udp"
      - "27021:27020/udp"   # SourceTV
    environment:
      # ── Identity ────────────────────────────────────────────────────────
      CS2_SERVERNAME: "Chef's CS2 Test Server"
      CS2_PORT: "27015"

      # ── Auth ────────────────────────────────────────────────────────────
      # GSLT only needed for public listing. LAN mode below skips it entirely.
      # Get one at https://steamcommunity.com/dev/managegameservers (App ID 730)
      # SRCDS_TOKEN: ""

      # LAN mode — 1 = LAN only, no Valve auth, perfect for plugin testing
      CS2_LAN: "1"

      # ── Passwords ───────────────────────────────────────────────────────
      CS2_RCONPW: "CHANGE_ME_RCON"
      CS2_PW: ""

      # ── Gameplay ────────────────────────────────────────────────────────
      CS2_MAXPLAYERS: "12"
      CS2_GAMEALIAS: "casual"        # casual | competitive | wingman | deathmatch
      CS2_STARTMAP: "de_dust2"
      CS2_MAPGROUP: "mg_active"
      CS2_BOT_QUOTA: "0"
      CS2_CHEATS: "1"

      # ── Stability ───────────────────────────────────────────────────────
      CS2_SERVER_HIBERNATE: "0"      # MUST be 0 — hibernation crashes CS2

      # ── SourceTV ────────────────────────────────────────────────────────
      TV_ENABLE: "0"
      TV_PORT: "27020"

      # ── Validation on each container start ──────────────────────────────
      STEAMAPPVALIDATE: "0"          # 1 = re-validate every restart (slower but safer)

      # ── Debug ───────────────────────────────────────────────────────────
      # 0 off, 1 steamcmd, 2 cs2, 3 all
      DEBUG: "0"
    volumes:
      # All ~60GB of CS2 + plugins + configs live here, persisted across restarts
      - ./data2:/home/steam/cs2-dedicated

networks:
  lanchache_default:
    external: true