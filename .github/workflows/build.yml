name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore + Build (Release)
        run: dotnet build ZombieMod.sln -c Release --nologo

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="dev-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building artifact: ZombieMod-${VERSION}.zip"

      - name: Package into drop-in zip
        run: |
          set -euo pipefail
          DIST="dist"
          PLUGIN_DIR="${DIST}/addons/counterstrikesharp/plugins/ZombieMod"
          CFG_DIR="${DIST}/addons/counterstrikesharp/configs/ZombieMod"
          mkdir -p "${PLUGIN_DIR}" "${CFG_DIR}"

          # Plugin DLLs.
          # Whitelist the ones our plugin actually needs at runtime alongside ZombieMod.dll —
          # CSSharp provides CounterStrikeSharp.API.dll and Microsoft.Extensions.* itself.
          for dll in ZombieMod.dll ZombieMod.Api.dll CS2MenuManager.dll MySqlConnector.dll; do
            cp "ZombieMod/bin/Release/net8.0/${dll}" "${PLUGIN_DIR}/"
          done

          # Configs
          cp configs/*.json "${CFG_DIR}/"

          # README inside the zip so people know where to drop it
          cat > "${DIST}/INSTALL.txt" <<'EOF'
          ZombieMod for Counter-Strike 2

          1. Stop your CS2 dedicated server
          2. Extract this archive into your server's `game/csgo/` directory so the
             `addons/counterstrikesharp/` paths overlay your existing CSSharp install
          3. Make sure these mods are also installed:
              - Metamod:Source
              - CounterStrikeSharp >= v1.0.355
              - MovementUnlocker (for knockback)
              - MultiAddonManager (for custom workshop content)
              - CS2-EmitSoundVolumeFix (for runtime volume control on EmitSound)
          4. Start the server. Plugin auto-loads.

          Edit configs in `addons/counterstrikesharp/configs/ZombieMod/` and run
          `css_zreload` in-game (admin only) to apply changes without restart.

          Project: https://github.com/sn1ce/cs2_z_plugin
          EOF

          OUT="ZombieMod-${{ steps.version.outputs.version }}.zip"
          (cd "${DIST}" && zip -r "../${OUT}" addons INSTALL.txt > /dev/null)
          echo "Built ${OUT} ($(du -h ${OUT} | cut -f1))"
          unzip -l "${OUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZombieMod-${{ steps.version.outputs.version }}
          path: ZombieMod-*.zip
          if-no-files-found: error

      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ZombieMod-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
