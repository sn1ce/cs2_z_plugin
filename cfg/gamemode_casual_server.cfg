// ZombieMod override file — execs automatically AFTER gamemode_casual.cfg every map
// load. The engine looks for this exact filename ('exec: couldn't exec
// {*}cfg/gamemode_casual_server.cfg' appears in console when missing). Anything you
// pin here wins over both gamemode_casual.cfg and the previous "plugin REPEAT timer"
// approach, because CS2 execs this file as the LAST step of casual-mode bootstrap.
//
// Keep this in sync with configs/cvars.json. The plugin still applies cvars on Load
// + OnMapStart as a safety net, but this file is what makes them STICK on first map.

// Cheats OFF — plugin sets ammo via schema writes, no cheat cvars needed.
sv_cheats 0

// Buy
mp_buy_anywhere 1
mp_buytime 50
mp_startmoney 4000

// Round / warmup
mp_warmuptime 0
mp_warmup_pausetimer 0
mp_warmup_offline_enabled 0
mp_freezetime 1
mp_roundtime 4

// Bots
bot_quota_mode normal
bot_quota 2
bot_join_after_player 0

// Team / damage rules
mp_limitteams 0
mp_autoteambalance 0
mp_disconnect_kills_players 1
mp_solid_teammates 0
mp_teammates_are_enemies 0
mp_ignore_round_win_conditions 0
mp_give_player_c4 0

// Match-end pipeline (plugin owns rotation)
mp_maxrounds 9999
mp_match_can_clinch 0
mp_match_end_changelevel 0
mp_match_end_restart 1
mp_halftime 0
mp_overtime_enable 0

// Mode pin
game_type 0
game_mode 0
