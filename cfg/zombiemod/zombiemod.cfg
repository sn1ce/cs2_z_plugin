// ZombieMod required cvars.
// Drop this file at game/csgo/cfg/zombiemod/zombiemod.cfg and `exec zombiemod/zombiemod.cfg`
// from your gamemode config (or server.cfg).

mp_limitteams 0
mp_autoteambalance 0
mp_disconnect_kills_players 1
mp_roundtime 3
mp_roundtime_hostage 0
mp_roundtime_defuse 0
mp_solid_teammates 1

// Cross-team damage handled manually by the plugin (T zombies vs CT humans).
// Setting this to 1 will double-dip; leave at 0.
mp_teammates_are_enemies 0
